name: novel_v3
description: "WebNovel App"
repository: https://github.com/ThanCoder/novelv3
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 4.5.0
homepage: https://github.com/ThanCoder # ဒါမပါရင် error တက်တတ်ပါတယ်

environment:
  sdk: ^3.9.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  pdfrx: ^2.2.24
  pdfrx_engine: ^0.3.9
  than_pkg: ^5.0.0
  t_widgets: ^2.2.2
  desktop_drop: ^0.7.0
  uuid: ^4.5.3
  provider: ^6.1.5
  archive: ^4.0.9
  t_server: ^3.1.0
  flutter_animate: ^4.5.2
  t_client: ^0.2.0
  flutter_markdown_plus: ^1.0.7
  yaml: ^3.1.3
  t_db: ^1.4.0
  hb_db: ^1.4.0
  dart_html_dsl: ^0.0.3
  cached_network_image: ^3.4.1
  file_selector: ^1.1.0
  flutter_bloc: ^9.1.1
  dart_core_extensions: ^0.1.1
  image: ^4.8.0
  t_html_parser: 1.2.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.5.0
  # dart run change_app_package_name:main [com.new.package.name]
  flutter_launcher_icons: ^0.14.4
  # dart run flutter_launcher_icons
  flutter_lints: ^6.0.0

# dev lib
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/logo_1.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/lng/
    - CHANGELOG.md
    - README.md
    - pubspec.yaml
