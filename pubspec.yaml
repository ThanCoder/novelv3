name: novel_v3
description: "WebNovel App"
repository: https://github.com/ThanCoder/novelv3
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 5.0.0
homepage: https://github.com/ThanCoder # ဒါမပါရင် error တက်တတ်ပါတယ်
# build -appimage
# fastforge package --platform linux --targets appimage
# fastforge package --platform android --targets apk

environment:
  sdk: ^3.9.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_bloc: ^9.1.1
  package_info_plus: ^10.1.0
  chapters_db:
    # path: /home/thancoder/projects/plugins/chapters_db
    git: https://github.com/ThanCoder/chapters_db.git
  than_pkg:
    git: https://github.com/ThanCoder/than_pkg_flutter_lib.git
  dart_core_extensions: ^0.3.0
  t_widgets:
    git: https://github.com/ThanCoder/t_widget
  mime: ^2.0.0
  cf_lite: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.5.0
  # dart run change_app_package_name:main [com.new.package.name]
  # dart run change_app_package_name:main than.app.novl3.v5
  flutter_launcher_icons: ^0.14.4
  # dart run flutter_launcher_icons
  flutter_lints: ^6.0.0

# dev lib
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/logo_2.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - CHANGELOG.md
    - README.md
    - pubspec.yaml
